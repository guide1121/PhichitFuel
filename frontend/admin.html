<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>จัดการปั๊มน้ำมัน - ภูมิใจพิจิตร</title>
    
    <!-- Google Fonts: Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Custom CSS (ใช้ร่วมกับแอปหลัก) -->
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* สไตล์เสริมเฉพาะหน้าแอดมิน เพื่อให้ดูเป็นแอพ */
        .admin-page { padding-top: calc(var(--header-height) + var(--safe-top) + 20px); padding-bottom: calc(var(--safe-bottom) + 30px); padding-left: 15px; padding-right: 15px; overflow-y: auto; height: 100vh; }
        
        .station-card { padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .station-card h3 { color: var(--text-main); font-size: 18px; margin-bottom: 5px; }
        
        .fuel-edit-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .fuel-edit-label { font-weight: 600; font-size: 14px; color: var(--text-main); width: 40%; }
        .fuel-edit-select { flex: 1; padding: 8px; border: none; background: transparent; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text-muted); outline: none; }
        
        .alert-warning { background-color: #fee2e2; color: #991b1b; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: 600; }
        
        .btn-save-all { width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 12px; background-color: var(--accent-orange); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <!-- ส่วนหัว (Header) -->
    <header class="app-header glass-header">
        <div class="header-left">
            <a href="./index.html" style="text-decoration:none; color:var(--text-main); font-size:24px;">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
        </div>
        <div class="header-center">
            <h1 class="title-main">ศูนย์ควบคุม (Admin)</h1>
            <p class="title-sub">จัดการสถานะน้ำมันทุกสาขา</p>
        </div>
        <div class="header-right">
            <div style="width: 28px;"></div> <!-- Spacer -->
        </div>
    </header>

    <main class="admin-page">
        <!-- กล่องแจ้งเตือนหากไม่ใช่แอดมิน -->
        <div id="admin-warning" class="alert-warning neumorphic hidden">
            ⚠️ ตรวจสอบสิทธิ์ไม่ผ่าน กรุณากลับไปหน้าแรกแล้วล็อกอินจ้า
        </div>

        <div id="admin-content" class="hidden">
            <!-- ช่องค้นหา -->
            <div class="neumorphic-inset" style="display:flex; align-items:center; padding: 0 15px; border-radius: 20px; margin-bottom: 25px; height: 50px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF8C00" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="ค้นหาชื่อปั๊ม..." style="flex:1; border:none; background:transparent; font-size:16px; margin-left:10px; outline:none; color:var(--text-main);">
            </div>

            <!-- ลิสต์ปั๊มน้ำมัน (ฉบับการ์ด) -->
            <div id="station-list">
                <!-- ข้อมูลจะถูกโหลดตรงนี้ -->
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/admin.js"></script>
</body>
</html>
