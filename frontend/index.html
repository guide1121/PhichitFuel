<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ภูมิใจพิจิตร เช็กเชื้อเพลิง</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Google Fonts: Noto Sans Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- ส่วนหัว (Header) -->
    <header class="app-header glass-header">
        <div class="header-left">
            <!-- ไอคอนปั๊มน้ำมันสีส้ม/ขาว -->
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 6C3 4.89543 3.89543 4 5 4H15C16.1046 4 17 4.89543 17 6V22H3V6Z" fill="#FF8C00"/>
                    <path d="M8 8H12V12H8V8Z" fill="white"/>
                    <path d="M17 12H19C20.1046 12 21 12.8954 21 14V17C21 17.5523 20.5523 18 20 18H17" stroke="#FF8C00" stroke-width="2" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <div class="header-center">
            <h1 class="title-main">ภูมิใจพิจิตร เช็กเชื้อเพลิง</h1>
            <p class="title-sub">ตรวจสอบและรายงานสถานะน้ำมัน</p>
        </div>
        <div class="header-right">
            <!-- ไอคอน Profile/Login -->
            <button id="btn-profile" class="profile-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="8" r="4" stroke="#1F2937" stroke-width="2"/>
                    <path d="M4 20C4 16.6863 6.68629 14 10 14H14C17.3137 14 20 16.6863 20 20" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- พื้นที่แสดงแผนที่ (เต็มหน้าจอ) -->
    <main class="map-wrapper">
        <div id="map"></div>
        
        <!-- แถบค้นหาลอยทับแผนที่ -->
        <div class="floating-search neumorphic">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="ค้นหาบริเวณปั๊ม..." class="input-transparent">
        </div>
    </main>

    <!-- บัตรข้อมูลปั๊มน้ำมัน (Bottom Sheet) -->
    <div id="station-bottom-sheet" class="bottom-sheet glass-sheet closed">
        <!-- แถบดึง (Drag Handle) -->
        <div class="sheet-handle"></div>

        <div id="sheet-empty-state" class="sheet-content">
            <h3 style="text-align:center; color: var(--text-muted); margin-top:20px;">กรุณาเลือกปั๊มน้ำมันบนแผนที่</h3>
            <p style="text-align:center; font-size:14px; color:var(--text-muted);">หรือกดค้นหาปั๊มที่ต้องการด้านบน</p>
        </div>

        <div id="sheet-data-state" class="sheet-content hidden">
            <!-- ข้อมูลสถานี -->
            <div class="station-header">
                <h2 id="sheet-station-name" class="station-name">ปตท. สาขาพิจิตร</h2>
                <div class="station-meta">
                    <span id="sheet-distance" class="meta-tag neumorphic-inset">📍 2.5 กม.</span>
                    <span id="sheet-time" class="meta-tag neumorphic-inset">🕒 อัปเดต 5 นาทีที่แล้ว</span>
                </div>
            </div>

            <!-- สถานะน้ำมัน (สร้างด้วย JS) -->
            <div id="sheet-fuel-grid" class="fuel-status-grid">
                <!-- ข้อมูลจะถูก render ตรงนี้ -->
            </div>

            <!-- ปุ่มรายงานสถานะใหม่ -->
            <button id="btn-open-report" class="btn-primary-orange neumorphic-btn">
                📝 รายงานสถานะ
            </button>
        </div>
    </div>

    <!-- แถบนำทางด้านล่าง (Bottom Navigation) -->
    <!-- ... ระงับการเลือก nav ... -->
    <nav class="bottom-nav neumorphic-nav">
        <!-- ... -->
        <a href="#" class="nav-item active">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M9 20L3 17V4L9 7M9 20L15 17M9 20V7M15 17L21 20V7L15 4M15 17V4M9 7L15 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>แผนที่</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="2"/></svg>
            <span>รายงาน</span>
        </a>
        <a href="./admin.html" class="nav-item">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            <span>จัดการ</span>
        </a>
    </nav>

    <!-- Modal เมนู Profile/Login -->
    <div id="profile-modal" class="modal hidden glass-effect">
        <!-- ... เนื้อหาไม่ได้แก้ ... -->
        <div class="modal-content neumorphic">
            <span class="close-modal" id="close-profile">&times;</span>
            <h2 style="color:var(--accent-orange); margin-bottom:15px;">บัญชีผู้ใช้</h2>
            
            <div id="login-section">
                <button id="btn-login" class="btn-primary-orange neumorphic-btn" style="width:100%; display:flex; gap:10px; align-items:center; justify-content:center;">
                    <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    เข้าสู่ระบบ Google
                </button>
            </div>
            
            <div id="user-info" class="hidden">
                <p id="user-name" style="font-size: 18px; margin-bottom: 20px;"></p>
                <button id="btn-logout" class="btn-neumorphic-danger" style="width:100%; padding: 12px; border-radius:15px; font-weight:bold; font-size:16px;">ออกจากระบบ</button>
            </div>
        </div>
    </div>

    <!-- Modal สำหรับส่งรายงาน (แยกย่อยมาจาก Bottom Sheet) -->
    <div id="report-modal" class="modal hidden glass-effect" style="align-items: flex-end; padding-bottom: 20px;">
        <div class="modal-content neumorphic" style="max-height: 80vh; overflow-y: auto;">
            <span class="close-modal" id="close-report">&times;</span>
            <h2 style="color:var(--accent-orange); margin-bottom:20px; position:sticky; top:0; background:var(--bg-main); z-index:10; padding-top:10px;">รายงานสถานะ</h2>
            
            <div id="report-options-container">
                <!-- ข้อมูลตัวเลือกน้ำมันจะถูกสร้างปุ่มด้วย JS ตรงนี้ -->
            </div>
            
            <div id="report-feedback" class="feedback-msg" style="margin-top:20px; text-align:center;"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- App Logic -->
    <script type="module" src="./js/map.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
